name: Build Android APK

# স্বয়ংক্রিয়ভাবে APK ও AAB তৈরি করে — প্রতিটি push এবং tag-এ।
# Tag (v1.0.0 etc.) push করলে Release-এ APK auto-attach হবে।
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: |
          npm run build
          echo "=== Verifying build output ==="
          mkdir -p .output/public
          # TanStack Start (Nitro + Cloudflare) static index.html তৈরি করে না।
          # তাই Capacitor-এর জন্য আমরা একটি minimal shell index.html বানাই
          # যা live PWA লোড করে (offline হলে clear message দেখায়)।
          cat > .output/public/index.html <<'EOF'
          <!doctype html>
          <html lang="bn">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
              <title>হিসাব নিকাশ-২৪</title>
              <style>
                html,body{margin:0;padding:0;height:100%;background:#0f9d58;color:#fff;font-family:system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
                #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .3s}
                .spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
                @keyframes spin{to{transform:rotate(360deg)}}
                iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff}
                #err{display:none;padding:24px;text-align:center}
                #err button{margin-top:16px;padding:10px 20px;border:0;border-radius:8px;background:#fff;color:#0f9d58;font-weight:600;font-size:15px}
              </style>
            </head>
            <body>
              <div id="loader">
                <div class="spinner"></div>
                <div>হিসাব নিকাশ-২৪ লোড হচ্ছে…</div>
              </div>
              <div id="err">
                <h2>ইন্টারনেট সংযোগ পাওয়া যাচ্ছে না</h2>
                <p>অ্যাপ চালু করতে ইন্টারনেট সংযোগ প্রয়োজন।</p>
                <button onclick="location.reload()">আবার চেষ্টা করুন</button>
              </div>
              <iframe id="app" src="https://hisabnikas24.top/" allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen" onload="document.getElementById('loader').style.opacity=0;setTimeout(()=>document.getElementById('loader').remove(),300)"></iframe>
              <script>
                setTimeout(function(){
                  var l=document.getElementById('loader');
                  if(l){l.remove();document.getElementById('app').style.display='none';document.getElementById('err').style.display='block'}
                },15000);
              </script>
            </body>
          </html>
          EOF
          test -f .output/public/index.html || { echo "ERROR: failed to create index.html"; exit 1; }
          ls -la .output/public/



      - name: Verify webDir has index.html
        run: |
          WEBDIR=$(sed -n "s/.*webDir:[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" capacitor.config.ts)
          echo "webDir from capacitor.config.ts: $WEBDIR"
          test "$WEBDIR" = ".output/public" || { echo "ERROR: webDir '$WEBDIR' does not match expected '.output/public'"; exit 1; }
          test -f "$WEBDIR/index.html" || { echo "ERROR: $WEBDIR/index.html missing"; exit 1; }

      - name: Sync Android platform
        run: |
          set -e
          if [ ! -d "android/app" ]; then
            echo "Android platform missing — adding it"
            npx cap add android
          else
            echo "Android platform already present — skipping cap add"
          fi
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Build Release AAB (Play Store)
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/HisabNikash24-debug.apk
          cp android/app/build/outputs/apk/release/app-release.apk release/HisabNikash24-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab release/HisabNikash24-release.aab

      - name: Upload artifacts (every build)
        uses: actions/upload-artifact@v4
        with:
          name: HisabNikash24-Android
          path: release/*
          retention-days: 30

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          name: হিসাব নিকাশ-২৪ ${{ github.ref_name }}
          body: |
            ## 📱 Download Android App

            - **HisabNikash24-debug.apk** — সরাসরি ফোনে ইন্সটল করুন (testing)
            - **HisabNikash24-release.apk** — সরাসরি ফোনে ইন্সটল করার release APK
            - **HisabNikash24-release.aab** — Play Store-এ আপলোড করুন

            ### ইন্সটল করার নিয়ম
            1. APK ফাইলটি ফোনে ডাউনলোড করুন
            2. Settings → Security → "Unknown sources" enable করুন
            3. APK-এ tap করে Install করুন

      - name: Auto Release (main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: build-${{ github.run_number }}
          name: হিসাব নিকাশ-২৪ Build #${{ github.run_number }}
          generate_release_notes: true
          prerelease: false
          body: |
            ## 📱 স্বয়ংক্রিয় বিল্ড (main branch)

            Commit: ${{ github.sha }}

            - **HisabNikash24-debug.apk** — সরাসরি ইন্সটলের জন্য
            - **HisabNikash24-release.apk** — সরাসরি ফোনে ইন্সটল করার release APK
            - **HisabNikash24-release.aab** — Play Store-এর জন্য

      - name: Update "latest" rolling release (main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: latest
          name: সর্বশেষ APK (latest)
          prerelease: false
          body: |
            সবসময় main branch-এর সর্বশেষ বিল্ড এখানে থাকে।

            Build #${{ github.run_number }} · Commit ${{ github.sha }}

