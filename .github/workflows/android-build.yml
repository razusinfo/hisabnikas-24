name: Build Android APK

# স্বয়ংক্রিয়ভাবে APK ও AAB তৈরি করে — প্রতিটি push এবং tag-এ।
# Tag (v1.0.0 etc.) push করলে Release-এ APK auto-attach হবে।
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: |
          npm run build
          echo "=== Verifying build output ==="
          test -d .output/public || { echo "ERROR: .output/public directory not found after build"; exit 1; }
          # সত্যিকার Native অ্যাপের জন্য — bundled fullscreen WebView shell।
          # এটি hisabnikas24.top কে fullscreen iframe-এ embed করে যাতে কোনো
          # browser address bar বা URL field না দেখায়। অ্যাপটি একটি native
          # container হিসেবে কাজ করে।
          cat > .output/public/index.html <<'EOF'
          <!doctype html>
          <html lang="bn">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
              <meta name="theme-color" content="#059669" />
              <title>হিসাব নিকাশ-২৪</title>
              <style>
                html, body {
                  margin: 0;
                  padding: 0;
                  height: 100%;
                  width: 100%;
                  overflow: hidden;
                  background: #059669;
                  -webkit-user-select: none;
                  user-select: none;
                  -webkit-tap-highlight-color: transparent;
                }
                #app-frame {
                  position: fixed;
                  inset: 0;
                  width: 100%;
                  height: 100%;
                  border: 0;
                  display: block;
                }
                #loader {
                  position: fixed;
                  inset: 0;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;
                  background: #059669;
                  color: #fff;
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans Bengali", sans-serif;
                  z-index: 10;
                  transition: opacity .3s ease;
                }
                #loader.hidden { opacity: 0; pointer-events: none; }
                .spinner {
                  width: 44px;
                  height: 44px;
                  border: 4px solid rgba(255,255,255,.25);
                  border-top-color: #fff;
                  border-radius: 50%;
                  animation: spin 1s linear infinite;
                  margin-bottom: 14px;
                }
                @keyframes spin { to { transform: rotate(360deg); } }
              </style>
            </head>
            <body>
              <div id="loader">
                <div class="spinner"></div>
                <div>হিসাব নিকাশ-২৪ লোড হচ্ছে…</div>
              </div>
              <iframe
                id="app-frame"
                src="https://hisabnikas24.top/"
                allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen"
                allowfullscreen
              ></iframe>
              <script>
                var frame = document.getElementById('app-frame');
                var loader = document.getElementById('loader');
                frame.addEventListener('load', function () {
                  setTimeout(function () { loader.classList.add('hidden'); }, 400);
                });
                // 15s fallback — যাতে iframe load-এ সমস্যা হলেও loader আটকে না থাকে
                setTimeout(function () { loader.classList.add('hidden'); }, 15000);
              </script>
            </body>
          </html>
          EOF
          echo "Generated native WebView shell index.html"
          ls -la .output/public/


      - name: Verify webDir has index.html
        run: |
          WEBDIR=$(sed -n "s/.*webDir:[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" capacitor.config.ts)
          echo "webDir from capacitor.config.ts: $WEBDIR"
          test "$WEBDIR" = ".output/public" || { echo "ERROR: webDir '$WEBDIR' does not match expected '.output/public'"; exit 1; }
          test -f "$WEBDIR/index.html" || { echo "ERROR: $WEBDIR/index.html missing"; exit 1; }

      - name: Sync Android platform
        run: |
          set -e
          if [ ! -d "android/app" ]; then
            echo "Android platform missing — adding it"
            npx cap add android
          else
            echo "Android platform already present — skipping cap add"
          fi
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Build Release AAB (Play Store)
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk      release/HisabNikash24-debug.apk
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk release/HisabNikash24-release-unsigned.apk
          cp android/app/build/outputs/bundle/release/app-release.aab      release/HisabNikash24-release.aab

      - name: Upload artifacts (every build)
        uses: actions/upload-artifact@v4
        with:
          name: HisabNikash24-Android
          path: release/*
          retention-days: 30

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          name: হিসাব নিকাশ-২৪ ${{ github.ref_name }}
          body: |
            ## 📱 Download Android App

            - **HisabNikash24-debug.apk** — সরাসরি ফোনে ইন্সটল করুন (testing)
            - **HisabNikash24-release-unsigned.apk** — sign করে production-এ ব্যবহার করুন
            - **HisabNikash24-release.aab** — Play Store-এ আপলোড করুন

            ### ইন্সটল করার নিয়ম
            1. APK ফাইলটি ফোনে ডাউনলোড করুন
            2. Settings → Security → "Unknown sources" enable করুন
            3. APK-এ tap করে Install করুন

      - name: Auto Release (main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: build-${{ github.run_number }}
          name: হিসাব নিকাশ-২৪ Build #${{ github.run_number }}
          generate_release_notes: true
          prerelease: false
          body: |
            ## 📱 স্বয়ংক্রিয় বিল্ড (main branch)

            Commit: ${{ github.sha }}

            - **HisabNikash24-debug.apk** — সরাসরি ইন্সটলের জন্য
            - **HisabNikash24-release-unsigned.apk** — sign করে production-এ ব্যবহার করুন
            - **HisabNikash24-release.aab** — Play Store-এর জন্য

      - name: Update "latest" rolling release (main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: latest
          name: সর্বশেষ APK (latest)
          prerelease: false
          body: |
            সবসময় main branch-এর সর্বশেষ বিল্ড এখানে থাকে।

            Build #${{ github.run_number }} · Commit ${{ github.sha }}

